<ol class="cui-breadcrumb__list">
  @for (item of resolved(); track item.label; let last = $last) {
    <li class="cui-breadcrumb__item">
      @if (item.routerLink && !last) {
        <a class="cui-breadcrumb__link" [routerLink]="item.routerLink">
          {{ item.label }}
        </a>
      } @else {
        <span class="cui-breadcrumb__current"
          [attr.aria-current]="last ? 'page' : null">
          {{ item.label }}
        </span>
      }
      @if (!last) {
        <cui-icon [name]="separator()" size="xs"
          color="var(--mat-sys-outline)" aria-hidden="true" />
      }
    </li>
  }
</ol>
