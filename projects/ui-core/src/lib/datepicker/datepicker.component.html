<mat-form-field
  [appearance]="matAppearance()"
  [class.cui-datepicker--full]="fullWidth()"
  class="cui-datepicker">

  @if (label()) {
    <mat-label>{{ label() }}@if (required()) {<span aria-hidden="true"> *</span>}</mat-label>
  }

  <input matInput
    [matDatepicker]="picker"
    [value]="value()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [required]="required()"
    [min]="min() ?? undefined"
    [max]="max() ?? undefined"
    [attr.aria-invalid]="hasError() ? 'true' : null"
    (dateChange)="onDateChange($event.value)"
    (blur)="onBlur()" />

  <mat-datepicker-toggle matIconSuffix [for]="picker" />
  <mat-datepicker #picker />

  @if (hint() && !error()) { <mat-hint>{{ hint() }}</mat-hint> }
  @if (error())             { <mat-error>{{ error() }}</mat-error> }

</mat-form-field>
