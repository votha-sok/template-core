<mat-form-field
  [appearance]="matAppearance()"
  [class.cui-input--sm]="size() === 'sm'"
  [class.cui-input--lg]="size() === 'lg'"
  [class.cui-input--full]="fullWidth()"
  class="cui-input">

  @if (label()) {
    <mat-label>{{ label() }}@if (required()) { <span aria-hidden="true"> *</span> }</mat-label>
  }

  @if (prefixIcon()) {
    <cui-icon matPrefix [name]="prefixIcon()!" size="sm"
      color="var(--mat-sys-on-surface-variant)" class="mr-1" />
  }

  <input matInput
    [type]="type()"
    [value]="value()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [readonly]="readonly()"
    [required]="required()"
    [autocomplete]="autocomplete()"
    [attr.aria-invalid]="hasError() ? 'true' : null"
    (input)="onInput($event)"
    (blur)="onBlur($event)"
    (focus)="onFocus($event)" />

  @if (suffixIcon()) {
    <cui-icon matSuffix [name]="suffixIcon()!" size="sm"
      color="var(--mat-sys-on-surface-variant)" class="ml-1" />
  }

  @if (hint() && !error()) {
    <mat-hint>{{ hint() }}</mat-hint>
  }
  @if (error()) {
    <mat-error>{{ error() }}</mat-error>
  }

</mat-form-field>
